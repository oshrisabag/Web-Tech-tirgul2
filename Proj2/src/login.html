<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-sm shadow-sm w-full max-w-sm border border-gray-100">
        
        <h1 class="text-2xl font-semibold text-center text-gray-800 mb-8">
            Login
        </h1>

        <form id="loginForm" class="flex flex-col gap-4" action="/src/login" method="post">
            
            <input id="userInput" type="text" placeholder="Username or Email"
                class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50">

            <input id="passInput" type="password" placeholder="Password"
                class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50">

            <button type="submit"
                class="w-full bg-blue-500 text-white py-3 rounded-md font-medium hover:bg-blue-600 transition-colors mt-2">
                Login
            </button>
        </form>
        <div id="loginMessage" class="mt-2 text-red-500 text-center text-sm"></div>

        <div class="text-center mt-6">
            <a href="register.html" class="text-blue-400 text-sm hover:underline">
                Don't have an account? Register
            </a>
        </div>

        <div class="text-right mt-4">
            <a href="#" class="block text-right mt-4 text-blue-500 hover:underline" onclick="alert('Forgot password functionality to be implemented.');">Forgot Password?</a>
        </div>

    </div>
    <script src="login.js"></script>
</body>
</html>
