<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-6">

    <div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">

        <h1 id="welcomeText" class="text-2xl font-bold mb-6"></h1>

        <table class="w-full border border-gray-200 text-left">
            <thead class="bg-gray-100">
                <tr>
                    <th class="p-2 border">Username</th>
                    <th class="p-2 border">Email</th>
                    <th class="p-2 border">Date of Birth</th>
                    <th class="p-2 border">Admin</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>

    </div>

    <script src="userManagement.js"></script>
</body>
</html>
