<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-sm shadow-sm w-full max-w-sm border border-gray-100">
        
        <h1 class="text-2xl font-semibold text-center text-gray-800 mb-8">Register</h1>

        <form id="registerForm" action="/src/register.html" method="post" class="flex flex-col gap-4">
            
            <input id="userInput" type="text" placeholder="a" 
                class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50">

            <input id="mailInput" type="email" placeholder="a@b.com" 
                class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50">

            <input id="passInput" type="password" placeholder="password" 
                class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50">

            <input id="confirmInput" type="password" placeholder="confirm password" 
                class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50">

            <div class="text-right">
                <label class="block text-sm text-gray-600 mb-1">Date of Birth</label>
                <input id="dateInput" type="date" value="2025-03-18"
                    class="w-full p-3 border border-gray-200 rounded-sm focus:outline-none focus:border-blue-400 bg-gray-50/50 text-gray-500">
            </div>

            <button type="submit" 
                class="w-full bg-blue-500 text-white py-3 rounded-md font-medium hover:bg-blue-600 transition-colors mt-2">
                Register
            </button>
        </form>
        <div id="registerMessage" class="mt-2 text-red-500 text-center text-sm"></div>
        <div class="text-center mt-6">
            <a href="login.html" class="text-blue-400 text-sm hover:underline">Already have an account? Login</a>
        </div>

    </div>
    <script src="register.js"></script>
</body>
</html>
